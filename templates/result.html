<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="result.css"> <!-- Link external CSS -->
</head>
<style>
    /* GLOBAL STYLE */
body {
  font-family: 'Poppins', sans-serif;
  background-image: url('/static/image/result.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* MAIN CONTAINER */
.result-container {
  background-color: rgba(255, 255, 255, 0.1);
  padding: 60px 40px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 600px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
}

/* HEADINGS */
.result-container h1 {
  font-size: 42px;
  margin-bottom: 25px;
  text-transform: uppercase;
  letter-spacing: 2px;
  
  
}

.prediction-box {
  background-color: rgba(255, 255, 255, 0.15);
  padding: 25px;
  border-radius: 15px;
  margin-bottom: 30px;
  box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.1);
}

.prediction-box h2 {
  font-size: 26px;
  font-weight: 900;
  color: #66033c;
}

.prediction-box span {
  font-weight: 700;
  color: #00ff9d;
  text-transform: uppercase;
}

/* BUTTONS */
.button-group {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.btn {
  text-decoration: none;
  background-color: #fff;
  color: #007bff;
  padding: 12px 25px;
  border-radius: 8px;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
}

.btn:hover {
  background-color: #00ff9d;
  color: #000;
  transform: scale(1.05);
}

.home-btn {
  background-color: #ff6f61;
  color: #fff;
}

.home-btn:hover {
  background-color: #ffb347;
  color: #000;
}

/* RESPONSIVE DESIGN */
@media (max-width: 600px) {
  .result-container {
    padding: 40px 25px;
  }

  .result-container h1 {
    font-size: 32px;
  }

  .prediction-box h2 {
    font-size: 22px;
  }
}

</style>
<body>
    <div class="result-container">
        <h1>Prediction Result</h1>
        <div class="prediction-box">
            <h2>Customer will: <span>{{ prediction }}</span></h2>
        </div>
        <div class="button-group">
            <a href="/predict" class="btn">🔁 Predict Another</a>
            <a href="/" class="btn home-btn">🏠 Home</a>
        </div>
    </div>
</body>
</html>
